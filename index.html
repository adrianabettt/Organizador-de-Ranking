<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Copa Byte - Organizador</title>
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .game-container { background: var(--card); padding: 30px; border-radius: 24px; width: 700px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .setup { display: flex; justify-content: space-around; gap: 20px; margin-top: 20px; }
        .column { width: 45%; min-height: 350px; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 10px; }
        .draggable-name { background: var(--primary); color: white; padding: 12px; margin: 10px auto; border-radius: 10px; cursor: grab; font-weight: bold; width: 85%; box-shadow: 0 4px 0 #4338ca; }
        .drop-zone { background: rgba(255,255,255,0.05); border: 2px dashed #475569; height: 55px; margin: 10px 0; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; }
        .drop-zone::before { content: attr(data-rank); position: absolute; left: -45px; font-size: 1.4rem; font-weight: 900; color: #475569; }
        button { padding: 15px 30px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; background: var(--success); color: white; margin-top: 20px; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🏆 Jogo 1: Organizador de Ranking</h1>
        <p>Arraste os amigos para o pódio em ordem decrescente (Maior pontuação = 1º lugar).</p>
        <div class="setup">
            <div class="column" id="source-col"></div>
            <div class="column">
                <div class="drop-zone" data-rank="1º" id="z0"></div>
                <div class="drop-zone" data-rank="2º" id="z1"></div>
                <div class="drop-zone" data-rank="3º" id="z2"></div>
                <div class="drop-zone" data-rank="4º" id="z3"></div>
                <div class="drop-zone" data-rank="5º" id="z4"></div>
            </div>
        </div>
        <button onclick="verificar()">Validar Ranking</button>
    </div>

    <div id="modal">
        <h2 id="nota-texto" style="font-size: 4rem; margin: 0;"></h2>
        <p id="msg-texto" style="font-size: 1.5rem;"></p>
        <button onclick="document.getElementById('modal').style.display='none'">Tentar Corrigir</button>
    </div>

    <script>
        const dados = [{n:"Marcos", p:980}, {n:"Julia", p:850}, {n:"Ricardo", p:720}, {n:"Beatriz", p:600}, {n:"Tiago", p:450}];
        let dragItem = null;

        function iniciar() {
            const sourceCol = document.getElementById('source-col');
            [...dados].sort(() => Math.random() - 0.5).forEach(amigo => {
                const div = document.createElement('div');
                div.className = 'draggable-name';
                div.draggable = true;
                div.innerText = `${amigo.n} (${amigo.p} pts)`;
                div.dataset.nome = amigo.n;
                div.ondragstart = function() { dragItem = this; };
                div.onclick = function() { if(this.parentElement.classList.contains('drop-zone')) sourceCol.appendChild(this); };
                sourceCol.appendChild(div);
            });
        }

        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.ondragover = e => e.preventDefault();
            zone.ondrop = function() { if(!this.firstChild) this.appendChild(dragItem); };
        });

        function verificar() {
            let acertos = 0;
            const gabarito = ["Marcos", "Julia", "Ricardo", "Beatriz", "Tiago"];
            for(let i=0; i<5; i++) {
                const z = document.getElementById(`z${i}`);
                if(z.firstChild && z.firstChild.dataset.nome === gabarito[i]) acertos++;
            }
            const modal = document.getElementById('modal');
            document.getElementById('nota-texto').innerText = (acertos/5)*10;
            document.getElementById('msg-texto').innerText = acertos === 5 ? "Parabéns! Ranking Perfeito!" : "Alguns amigos estão no lugar errado!";
            modal.style.display = "flex";
        }
        iniciar();
    </script>
</body>
</html>
