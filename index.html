<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Copa Byte - Organizador de Ranking</title>
    <style>
        :root { 
            --primary: #6366f1; 
            --success: #22c55e; 
            --error: #ef4444; 
            --bg: #0f172a; 
            --card: #1e293b; 
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .game-container { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 24px; 
            width: 700px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
        }

        .setup { 
            display: flex; 
            justify-content: space-around; 
            gap: 20px; 
            margin-top: 20px; 
        }

        .column { 
            width: 45%; 
            min-height: 380px; 
            background: rgba(0,0,0,0.2); 
            border-radius: 15px; 
            padding: 15px; 
        }

        .draggable-name { 
            background: var(--primary); 
            color: white; 
            padding: 12px; 
            margin: 10px auto; 
            border-radius: 10px; 
            cursor: grab; 
            font-weight: bold; 
            width: 85%; 
            box-shadow: 0 4px 0 #4338ca; 
            transition: transform 0.2s;
            user-select: none;
        }

        .draggable-name:active { cursor: grabbing; transform: scale(0.95); }

        .drop-zone { 
            background: rgba(255,255,255,0.05); 
            border: 2px dashed #475569; 
            height: 55px; 
            margin: 10px 0; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
        }

        .drop-zone::before { 
            content: attr(data-rank); 
            position: absolute; 
            left: -45px; 
            font-size: 1.4rem; 
            font-weight: 900; 
            color: #475569; 
        }

        .controls { margin-top: 25px; display: flex; gap: 15px; justify-content: center; }
        
        button { 
            padding: 15px 30px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            color: white; 
            font-size: 1rem;
        }

        .btn-check { background: var(--success); }
        .btn-reset { background: #64748b; }

        /* Modal de Resultado */
        #modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 10; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
        }

        .nota-destaque { font-size: 6rem; font-weight: 900; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>🏆 Jogo 1: Organizador de Ranking</h1>
        <p>Arraste os amigos para o pódio em ordem decrescente (do maior para o menor).</p>
        
        <div class="setup">
            <div class="column" id="source-col"></div>
            <div class="column">
                <div class="drop-zone" data-rank="1º" id="z0"></div>
                <div class="drop-zone" data-rank="2º" id="z1"></div>
                <div class="drop-zone" data-rank="3º" id="z2"></div>
                <div class="drop-zone" data-rank="4º" id="z3"></div>
                <div class="drop-zone" data-rank="5º" id="z4"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-check" onclick="verificar()">Validar Ranking</button>
        </div>
    </div>

    <div id="modal">
        <h2 style="font-size: 2rem;">Resultado da Avaliação</h2>
        <div id="nota-texto" class="nota-destaque">0</div>
        <p id="msg-texto" style="font-size: 1.5rem; max-width: 500px; margin-bottom: 30px;"></p>
        <div class="controls">
            <button class="btn-check" id="btn-acao" onclick="fecharEReiniciar()">Reiniciar e Tentar Novamente</button>
        </div>
    </div>

    <script>
        // Dados originais (Gabarito implícito: a ordem deste array)
        const dados = [
            {n:"Marcos", p:980}, 
            {n:"Julia", p:850}, 
            {n:"Ricardo", p:720}, 
            {n:"Beatriz", p:600}, 
            {n:"Tiago", p:450}
        ];
        
        let dragItem = null;

        function iniciar() {
            const sourceCol = document.getElementById('source-col');
            sourceCol.innerHTML = ''; 
            
            // Embaralha para o desafio
            const embaralhados = [...dados].sort(() => Math.random() - 0.5);
            
            embaralhados.forEach(amigo => {
                const div = document.createElement('div');
                div.className = 'draggable-name';
                div.draggable = true;
                div.innerText = `${amigo.n} (${amigo.p} pts)`;
                div.dataset.nome = amigo.n;
                
                div.ondragstart = function() { dragItem = this; };
                
                // Se clicar em um nome já posicionado, ele volta para a lista
                div.onclick = function() { 
                    if(this.parentElement.classList.contains('drop-zone')) {
                        sourceCol.appendChild(this);
                    }
                };
                sourceCol.appendChild(div);
            });
        }

        // Configuração das Zonas de Drop
        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.ondragover = e => e.preventDefault();
            zone.ondrop = function() { 
                if(!this.firstChild) {
                    this.appendChild(dragItem);
                } 
            };
        });

        function verificar() {
            let acertos = 0;
            const total = dados.length;
            const gabarito = dados.map(d => d.n); // Ordem correta: Marcos, Julia, Ricardo...

            for(let i=0; i < total; i++) {
                const zona = document.getElementById(`z${i}`);
                if(zona.firstChild && zona.firstChild.dataset.nome === gabarito[i]) {
                    acertos++;
                }
            }

            // Cálculo da nota de 0 a 10
            const notaFinal = (acertos / total) * 10;
            exibirModal(notaFinal, acertos === total);
        }

        function exibirModal(nota, perfeito) {
            const modal = document.getElementById('modal');
            const notaTxt = document.getElementById('nota-texto');
            const msgTxt = document.getElementById('msg-texto');
            const btnAcao = document.getElementById('btn-acao');

            notaTxt.innerText = nota.toFixed(1);
            modal.style.display = "flex";

            if(perfeito) {
                notaTxt.style.color = "var(--success)";
                msgTxt.innerText = "Incrível! Você domina o ranking. Nota máxima!";
                btnAcao.innerText = "Jogar Novamente";
            } else {
                notaTxt.style.color = "var(--error)";
                msgTxt.innerText = "Alguns amigos estão fora de ordem. O jogo será reiniciado para você buscar o 10!";
                btnAcao.innerText = "Reiniciar e Tentar Novamente";
            }
        }

        function fecharEReiniciar() {
            // Esconde modal
            document.getElementById('modal').style.display = 'none';
            // Limpa o pódio
            document.querySelectorAll('.drop-zone').forEach(z => z.innerHTML = '');
            // Reinicia os nomes na esquerda reembaralhados
            iniciar();
        }

        // Inicialização
        iniciar();
    </script>
</body>
</html>
